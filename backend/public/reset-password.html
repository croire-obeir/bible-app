<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialisation - Croire et Obéir</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 90%;
            max-width: 420px;
            text-align: center;
        }

        h2 { margin-bottom: 1.5rem; color: #1a1a1a; font-size: 1.5rem; }

        .form-group { text-align: left; margin-bottom: 1.2rem; }

        label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.9rem; }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px; /* Prevents auto-zoom on iOS */
            transition: border-color 0.2s;
        }

        input:focus { outline: none; border-color: #007AFF; }

        .helper-text { font-size: 0.8rem; margin-top: 0.4rem; min-height: 1em; }
        .error { color: #d93025; }
        .success { color: #188038; }

        button {
            width: 100%;
            padding: 14px;
            background-color: rgb(212, 175, 55);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: opacity 0.2s;
        }

        button:disabled { background-color: #ccc; cursor: not-allowed; }

        .status-card p {
            line-height: 1.6;
            color: #555;
            white-space: pre-line; /* Essential for the \n from Express */
        }

        .btn-app {
            display: inline-block;
            margin-top: 1.5rem;
            color: #007AFF;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container" id="content-wrapper">
        <h2>Réinitialiser le mot de passe</h2>
        <form id="resetForm">
            <div class="form-group">
                <label for="newPassword">Nouveau mot de passe</label>
                <input type="password" id="newPassword" placeholder="Entrez votre mot de passe" required>
                <div id="complexityMsg" class="helper-text"></div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmer le mot de passe</label>
                <input type="password" id="confirmPassword" placeholder="Répétez le mot de passe" required disabled>
                <div id="matchMsg" class="helper-text"></div>
            </div>

            <button type="submit" id="submitBtn" disabled>Mettre à jour</button>
        </form>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const newPass = document.getElementById('newPassword');
        const confPass = document.getElementById('confirmPassword');
        const matchMsg = document.getElementById('matchMsg');
        const complexityMsg = document.getElementById('complexityMsg');
        const submitBtn = document.getElementById('submitBtn');
        const wrapper = document.getElementById('content-wrapper');

        const isStrong = (p) => p.length >= 8 && /[A-Z]/.test(p) && /[0-9]/.test(p) && /[^a-zA-Z0-9]/.test(p);

        // Logic for New Password Input
        newPass.addEventListener('input', () => {
            const p1 = newPass.value;
            
            // RESET Confirm Pass when New Pass changes (As requested)
            confPass.value = '';
            confPass.disabled = true;
            matchMsg.textContent = "";
            submitBtn.disabled = true;

            if (p1.length > 0) {
                if (isStrong(p1)) {
                    complexityMsg.textContent = "✅ Mot de passe fort";
                    complexityMsg.className = "helper-text success";
                    confPass.disabled = false;
                } else {
                    complexityMsg.textContent = "⚠️ Requis: 8+ car, Majuscule, Chiffre, Symbole";
                    complexityMsg.className = "helper-text error";
                }
            } else {
                complexityMsg.textContent = "";
            }
        });

        // Logic for Confirm Password Input
        confPass.addEventListener('input', () => {
            if (confPass.value === newPass.value) {
                matchMsg.textContent = "✓ Les mots de passe correspondent";
                matchMsg.className = "helper-text success";
                submitBtn.disabled = false;
            } else {
                matchMsg.textContent = "× Les mots de passe ne correspondent pas";
                matchMsg.className = "helper-text error";
                submitBtn.disabled = true;
            }
        });

        document.getElementById('resetForm').onsubmit = async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerText = "Mise à jour...";

            try {
                const response = await fetch('/api/user/password-reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password: newPass.value })
                });

                const result = await response.json();

                if (response.status === 200) {
                    wrapper.innerHTML = `
                        <div class="status-card">
                            <h2>✅ Succès !</h2>
                            <p>Votre mot de passe a été mis à jour.</p>
                            <p>Vous pouvez fermer cette page et retourner sur l'application <strong>Croire et Obéir</strong> pour vous connecter.</p>
                        </div>`;
                } else if (response.status === 400) {
                    wrapper.innerHTML = `
                        <div class="status-card">
                            <h2 style="color: #d93025;">Lien Expiré</h2>
                            <p>Lien de réinitialisation invalide ou expiré. Veuillez refaire une demande de réinitialisation.</p>
                            <p>Retournez sur l'application <strong>Croire et Obéir</strong> et cliquez sur "Mot de passe oublié" pour recevoir un nouveau lien.</p>
                        </div>`;
                } else {
                    matchMsg.innerText = "Erreur serveur. Veuillez réessayer.";
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Mettre à jour";
                }
            } catch (error) {
                matchMsg.innerText = "Erreur de connexion.";
                submitBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
