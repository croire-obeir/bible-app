<!DOCTYPE html>
<html>
<body>
    <h2>Réinitialiser le mot de passe</h2>
    <form id="resetForm">
        <input type="password" id="newPassword" placeholder="Nouveau mot de passe" required>
        <button type="submit">Mettre à jour</button>
    </form>
    <p id="message"></p>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token'); // Grabs the token from the URL

        document.getElementById('resetForm').onsubmit = async (e) => {
            e.preventDefault();
            const password = document.getElementById('newPassword').value;

            const response = await fetch('http://localhost:3000/api/user/password-reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, password })
            });

            const result = await response.json();
            document.getElementById('message').innerText = result.message || result.error;
        };
    </script>
</body>
</html>
